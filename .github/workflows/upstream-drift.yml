name: upstream-drift

on:
  schedule:
    - cron: "0 8 * * 1"
  workflow_dispatch:
  pull_request:

jobs:
  drift:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Clone omarchy-upstream
        run: |
          set -euo pipefail
          ref=$(cat .omarchy-upstream-ref)
          git clone https://github.com/berdyh/omarchy-upstream.git /tmp/omarchy-upstream
          git -C /tmp/omarchy-upstream checkout "$ref"
          git -C /tmp/omarchy-upstream fetch origin dev

      - name: Fail if high-risk files changed upstream since merge-base
        run: |
          set -euo pipefail
          base=$(git -C /tmp/omarchy-upstream merge-base HEAD origin/dev)

          git -C /tmp/omarchy-upstream diff --name-only "$base"..origin/dev -- \
            'install/preflight/*' \
            'install/post-install/*' \
            'install/login/*' \
            'install/config/hardware/*' \
            'bin/omarchy-update*' \
            config/uwsm/env \
            config/hypr/bindings.conf | tee /tmp/changed.txt

          if grep -q . /tmp/changed.txt; then
            echo "High-risk upstream drift detected; compatibility review required in omacachy."
            exit 1
          fi

          echo "No high-risk upstream drift in monitored window."
